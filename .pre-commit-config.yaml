repos:
  - repo: local
    hooks:
      - id: uv-sync-check
        name: Check uv dependencies can sync
        entry: uv sync --dry-run
        language: system
        pass_filenames: false
        files: ^(pyproject\.toml|uv\.lock)$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        additional_dependencies: [pydantic>=2.0.0]
        args: [--ignore-missing-imports]
        files: ^(agents|orchestration|rag|prompts|evaluation)/

